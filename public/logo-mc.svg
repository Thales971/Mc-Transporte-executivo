<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MC Transporte Executivo">
  <defs>
    <linearGradient id="mcGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E7A8"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8842A"/>
    </linearGradient>
    <linearGradient id="mcGoldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C158"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- Símbolo MC em hexágono (remete a emblema/medalha premium) -->
  <g transform="translate(8,8)">
    <!-- Hexágono externo dourado -->
    <path d="M24 0 L42 10 V30 L24 40 L6 30 V10 Z" fill="none" stroke="url(#mcGoldStroke)" stroke-width="2"/>
    <!-- Hexágono interno preto -->
    <path d="M24 3 L39.5 11.5 V28.5 L24 37 L8.5 28.5 V11.5 Z" fill="#0A0A0A"/>

    <!-- Letras MC estilizadas -->
    <text x="24" y="26" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="20" fill="url(#mcGold)" letter-spacing="-1">MC</text>

    <!-- Pequeno detalhe de estrada (linhas) abaixo das letras -->
    <line x1="14" y1="31" x2="34" y2="31" stroke="url(#mcGold)" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="33" x2="30" y2="33" stroke="url(#mcGold)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Texto da marca -->
  <g transform="translate(64,0)">
    <text x="0" y="28" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="26" fill="#F5F5F4" letter-spacing="2">MC</text>
    <text x="46" y="28" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="14" fill="url(#mcGold)" letter-spacing="3">TRANSPORTE</text>
    <text x="0" y="48" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#A3A3A3" letter-spacing="6">EXECUTIVO</text>
  </g>
</svg>
